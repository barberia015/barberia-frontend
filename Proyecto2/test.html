<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Hamburguesa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            position: relative;
            background: #222;
            padding: 15px;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Menú normal */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .nav-bar ul {
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-bar a {
            color: white;
            text-decoration: none;
        }

        /* Botón hamburguesa */
        .menu-toggle {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            position: absolute;
            top: 15px;
            right: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-bar {
                display: none;
                position: absolute;
                top: 60px;
                right: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.95);
                padding: 20px 0;
                flex-direction: column;
                text-align: center;
            }

            .nav-bar ul {
                flex-direction: column;
                gap: 15px;
            }

            .nav-bar.active {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">015 CUTZ BARBERSHOP</div>

        <!-- Botón hamburguesa -->
        <div class="menu-toggle" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </div>

        <!-- Menú -->
        <nav class="nav-bar">
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Academia</a></li>
                <li><a href="#">Tienda</a></li>
                <li><a href="#">Lugar</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding:20px;">
        <h1>Prueba Menú Hamburguesa</h1>
        <p>Reduce la pantalla y haz clic en ☰ para abrir el menú.</p>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const menuToggle = document.getElementById("menu-toggle");
            const navBar = document.querySelector(".nav-bar");

            if (menuToggle && navBar) {
                menuToggle.addEventListener("click", () => {
                    navBar.classList.toggle("active");
                    menuToggle.querySelector("i").classList.toggle("fa-bars");
                    menuToggle.querySelector("i").classList.toggle("fa-times");
                });
            }
        });
    </script>
</body>
</html>
